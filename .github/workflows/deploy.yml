# Builds the VitePress docs site and deploys it to GitHub Pages.
# Requires a one-time repo setting: Settings → Pages → Build and deployment →
# Source = "GitHub Actions", with the custom domain set to bonsai.rhino-inquisitor.com.
# https://vitepress.dev/guide/deploy#github-pages
name: Deploy docs to Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

# Least-privilege token; only what Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight Pages deployment at a time; don't cancel a running one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        # pnpm version is read from the "packageManager" field in package.json.

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with VitePress
        run: pnpm docs:build

      - name: Verify custom domain artifact
        run: test "$(cat docs/.vitepress/dist/CNAME)" = "bonsai.rhino-inquisitor.com"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://bonsai.rhino-inquisitor.com/
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
