name: Publish

# This workflow follows the Changesets PR-based release flow:
#   1. After CI succeeds on `main`, if pending `.changeset/*.md` files
#      exist, the `changesets/action` opens (or updates) a "Release
#      @taurgis/bonsai" PR that bumps the version and rewrites the changelog.
#   2. Merging that PR back into `main` re-runs CI, and on success this
#      workflow runs `pnpm release` (`changeset publish`) and publishes
#      to npm. Tests and type-check are not duplicated here; CI is the
#      gate via `workflow_run`.
#
# Prerequisites (must be configured once on the repository):
#   - Settings -> Actions -> General -> "Workflow permissions":
#       * Read and write permissions
#       * Allow GitHub Actions to create and approve pull requests
#   - npm Trusted Publisher configured for this repo + workflow on npmjs.com
#     (publishes use OIDC via `id-token: write`; no `NPM_TOKEN` is required).
#     Configure the trusted publisher for workflow file `publish.yml` in this
#     repository (`taurgis/bonsai`).
#   - Optional secret `RELEASE_GITHUB_TOKEN`: a fine-grained PAT or GitHub
#     App token with `contents: write` and `pull-requests: write`. Using a
#     PAT is recommended so the release PR's merge commit triggers
#     downstream workflows (the default `GITHUB_TOKEN` cannot do that).

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release PR or publish
    # Skip when triggered by a failed CI run. workflow_dispatch has no
    # workflow_run context, so the conclusion check is bypassed there.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Type check and tests already ran in the CI workflow that gates this job.
      - name: Build
        run: pnpm build

      - name: Reset generated files
        run: |
          # Build may update generated manifests that should not land in release PR commits.
          git ls-files --error-unmatch oclif.manifest.json 2>/dev/null && git checkout -- oclif.manifest.json || true

      - name: Create release PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          title: 'chore: release @taurgis/bonsai'
          commit: 'chore: release @taurgis/bonsai'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Summarize action result
        run: |
          if [ "${{ steps.changesets.outputs.published }}" = "true" ]; then
            echo "Published to npm: ${{ steps.changesets.outputs.publishedPackages }}"
          elif [ -n "${{ steps.changesets.outputs.pullRequestNumber }}" ]; then
            echo "Release PR ready: #${{ steps.changesets.outputs.pullRequestNumber }}"
          else
            echo "No pending changesets and nothing to publish."
          fi
